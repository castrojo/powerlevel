name: Export + Deploy

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
  push:
    paths:
      - 'data/**'
      - 'src/**'
      - 'internal/**'
      - 'cmd/**'

jobs:
  validate-and-test:
    name: Validate + E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore computed triumphs cache
        uses: actions/cache@v4
        with:
          path: data/triumphs.json
          key: computed-${{ hashFiles('data/skill-levels.json', 'data/powerlevel-events.jsonl') }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: cd src && npm ci

      - name: Build Astro site (schema validation)
        run: cd src && npm run build

      - name: Install Playwright
        run: cd src && npx playwright install chromium --with-deps

      - name: E2E tests
        run: cd src && npx playwright test
        env:
          CI: true

  deploy:
    name: Deploy to GitHub Pages
    needs: validate-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore computed triumphs cache
        uses: actions/cache@v4
        with:
          path: data/triumphs.json
          key: computed-${{ hashFiles('data/skill-levels.json', 'data/powerlevel-events.jsonl') }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: cd src && npm ci

      - name: Build Astro site
        run: cd src && npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
