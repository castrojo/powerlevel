name: Export + Deploy

# gh4 fix: trigger on workflow_run so deploy always runs after compute completes.
# This eliminates the race where deploy could publish stale data before compute commits.
# Keep schedule + workflow_dispatch for manual and weekly runs.
on:
  workflow_run:
    workflows: ["Compute Powerlevel"]
    types: [completed]
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  validate-and-test:
    name: Validate + E2E
    # gh4 fix: only proceed if compute succeeded (workflow_run context) or triggered directly.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      # gh2/gh3 fix: checkout repo directly — data files are committed by compute.
      # No cache restore needed; stale cache could clobber repo fixes.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: cd src && npm ci

      - name: Build Astro site (schema validation)
        run: cd src && npm run build

      - name: Install Playwright
        run: cd src && npx playwright install chromium --with-deps

      - name: E2E tests
        run: cd src && npx playwright test
        env:
          CI: true

  deploy:
    name: Deploy to GitHub Pages
    needs: validate-and-test
    runs-on: ubuntu-latest
    permissions:
      # gh10 fix: reduced from contents:write — deploy job never commits to the repo.
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # gh2/gh3 fix: checkout repo directly — data files are committed by compute.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: cd src && npm ci

      - name: Build Astro site
        run: cd src && npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
