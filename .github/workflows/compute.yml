# compute.yml — Sync weapon levels from skill-levels.json + triumph state from events.
#
# Design: all computation runs in GitHub Actions. Zero cross-repo auth needed.
#   - data/skill-levels.json  (committed by agents alongside SKILL.md Level: changes)
#   - data/powerlevel-events.jsonl  (appended by agents when triumphs are earned)
#
# gh1 fix: no cache-hit skip — compute always runs (exits fast when no-change via GITHUB_OUTPUT).
# deploy.yml uses workflow_run on this workflow completing so there is no race condition.
# Auth: github.token only. No PATs, no deploy keys, no cross-repo calls.

name: Compute Powerlevel

on:
  push:
    paths:
      - 'data/skill-levels.json'
      - 'data/powerlevel-events.jsonl'
      - 'cmd/compute/**'
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'  # Mondays 09:00 UTC

concurrency:
  group: compute
  cancel-in-progress: true

jobs:
  compute:
    name: Compute weapon levels + triumph state
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout powerlevel
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run compute
        id: compute
        run: go run ./cmd/compute/

      - name: Commit updated data files
        if: steps.compute.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/powerlevel-data.json data/triumphs.json data/seals.json
          git diff --staged --quiet || git commit -m "chore: GHA compute — sync weapon levels + triumph state"
          git push

      - name: Run streak
        continue-on-error: true
        run: go run ./cmd/streak/

      - name: Commit streak.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/powerlevel-events.jsonl
          [ -f data/streak.json ] && git add data/streak.json || true
          git diff --staged --quiet || git commit -m "chore: GHA compute — update streak"
          git push
