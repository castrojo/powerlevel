# compute.yml — Sync weapon levels from skill-levels.json + triumph state from events.
#
# Design: all computation runs in GitHub Actions. Zero cross-repo auth needed.
#   - data/skill-levels.json  (committed by agents alongside SKILL.md Level: changes)
#   - data/powerlevel-events.jsonl  (appended by agents when triumphs are earned)
#
# Cache key = hash of both input files. Cache hit → skip computation entirely.
# deploy.yml restores from the same cache before building the Astro site.
# Auth: github.token only. No PATs, no deploy keys, no cross-repo calls.

name: Compute Powerlevel

on:
  push:
    paths:
      - 'data/skill-levels.json'
      - 'data/powerlevel-events.jsonl'
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'  # Mondays 09:00 UTC

concurrency:
  group: compute
  cancel-in-progress: true

jobs:
  compute:
    name: Compute weapon levels + triumph state
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout powerlevel
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Restore computed data cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            data/triumphs.json
          key: computed-${{ hashFiles('data/skill-levels.json', 'data/powerlevel-events.jsonl') }}

      - name: Run compute script
        if: steps.cache.outputs.cache-hit != 'true'
        id: compute
        run: python3 scripts/compute.py

      - name: Commit updated data files
        if: steps.cache.outputs.cache-hit != 'true' && steps.compute.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/powerlevel-data.json data/triumphs.json data/seals.json
          git diff --staged --quiet || git commit -m "chore: GHA compute — sync weapon levels + triumph state"
          git push
