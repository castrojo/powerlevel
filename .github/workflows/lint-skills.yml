name: Lint Skills

on:
  push:
    paths:
      - 'templates/skills/**'
      - 'templates/AGENTS.md'
      - 'templates/loop-state-template.md'
  pull_request:
    paths:
      - 'templates/skills/**'
      - 'templates/AGENTS.md'
      - 'templates/loop-state-template.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md frontmatter
        run: |
          set -euo pipefail
          failed=0
          for f in templates/skills/personal/*/SKILL.md; do
            if ! grep -q "^name:" "$f"; then
              echo "MISSING name: in $f"
              failed=1
            fi
            if ! grep -q "^description:" "$f"; then
              echo "MISSING description: in $f"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "Frontmatter lint failed — every SKILL.md must have name: and description: fields"
            exit 1
          fi
          echo "Frontmatter OK"

      - name: Check trigger table skill files exist
        run: |
          set -euo pipefail
          failed=0
          # Extract skill names from the AGENTS.md trigger table (backtick-quoted names in first column)
          while IFS= read -r skill; do
            path="templates/skills/personal/${skill}/SKILL.md"
            if [ ! -f "$path" ]; then
              echo "MISSING: $path (referenced in AGENTS.md trigger table)"
              failed=1
            fi
          done < <(grep -E "^\| \`[a-z]" templates/AGENTS.md | sed "s/.*\`\([a-z][a-z-]*\)\`.*/\1/" | grep -v "\.")
          if [ "$failed" -eq 1 ]; then
            echo "Trigger table lint failed — all skills in AGENTS.md must have a SKILL.md file"
            exit 1
          fi
          echo "Trigger table OK"

      - name: Check loop-state-template.md fields
        run: |
          set -euo pipefail
          template="templates/loop-state-template.md"
          failed=0
          for field in "^phase:" "^run:" "^goal:" "^## Improvements"; do
            if ! grep -q "$field" "$template"; then
              echo "MISSING field: ${field} in $template"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "loop-state-template.md lint failed"
            exit 1
          fi
          echo "loop-state-template.md OK"
